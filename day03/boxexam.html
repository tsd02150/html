<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title></title>
    
    <style>
      body *{
        border: 2px solid black;
        background-color: rgb(255, 196, 0);
        box-sizing: border-box;
        width: 400px;
        height: 200px;
        margin: 20px;
      }

      .box1{
        border-radius: 20%;
      }
      .box2{
        border-bottom-right-radius: 20%;
      }
      .box3{
        border-top-left-radius: 20%;
      }
      .box4{
        border-bottom-left-radius: 20%;
      }
    </style>>

  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
  </body>
</html>
