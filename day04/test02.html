<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title></title>
    <style>
      .container{
        border: 1px solid black;
        width: 800px;
        height: 400px;
        margin: 50px auto;
      }
      #box{
        width: 200px;
        height: 200px;
        background-color: black;
        margin: 100px auto;
        transition-property: width,height,background-color;
        transition-duration: 2s,1s;
        transition-timing-function: ease;
      }
      #box:hover{
        width: 400px;
        height: 250px;
        background-color: gold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="box"></div>
    </div>
  </body>
</html>
