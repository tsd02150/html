<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title></title>
</head>

<body>
  <script>
    var count = 0;
    for (let i = 0; i < 5; i++) {
      var num1 = Math.floor(Math.random() * 10 + 1);
      var num2 = Math.floor(Math.random() * 10 + 1);
      result = prompt(num1 + " + " + num2 + " = ");
      if (result == num1 + num2) {
        count++;
      }
    }
    document.write(count + "개 맞음");
  </script>
</body>

</html>
