<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title></title>
</head>

<body>
  <script>
    function calcSum(n) {
      var sum=0;
      for (let i=1;i<n+1;i++){
        sum+=i;
      }
      document.write("1부터 "+n+"까지 더하면 "+sum);
    }

    while(1){
      var userNum=prompt("얼마 까지 더할까?");
      if(userNum!==null){
        calcSum(parseInt(userNum));
        break;
      }
    }
  </script>
</body>

</html>
