<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>목록만들기</title>
  </head>
  <body>
    <h1>브라우니 만들기</h1>
    <ol type="i">
      <li>재료준비
        <ul>
          <li>밀가루</li>
          <li>설탕</li>
          <li>우유</li>
          <li>생크림</li>
          <li>계란</li>
        </ul>
      </li>
      <li>조리과정
        <ul>
          <li>계란을 휘핑하여 크림 만든다.</li>
          <li>밀가루와 설탕을 넣고 섞는다.</li>
        </ul>
      </li>
    </ol>

    <dl>
      <dt>이름</dt>
      <dd>설명</dd>
    </dl>

  </body>
</html>
